name: alive_app
description: "Alive — Live Streaming App (LVS Innovation Flutter Assignment)"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management, routing, DI
  get: ^4.6.6

  # Firebase
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.3
  google_sign_in: ^6.2.2

  # Networking
  dio: ^5.8.0+1

  # UI helpers
  cached_network_image: ^3.4.1
  flutter_svg: ^2.1.0

  # Clean architecture helpers
  equatable: ^2.0.7
  get_it: ^8.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
